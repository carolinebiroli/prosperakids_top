<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Prospera Kids</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@700;800&family=Nunito:wght@400;700;800&display=swap" rel="stylesheet">
    <script src="https://sdk.mercadopago.com/js/v2"></script>
    <style>
      body {
        font-family: 'Nunito', sans-serif;
      }
      @keyframes fadeIn {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      .animate-fade-in {
        animation: fadeIn 0.5s ease-in-out;
      }
      @keyframes pulse-subtle {
        0%, 100% {
          transform: scale(1);
        }
        50% {
          transform: scale(1.03);
        }
      }
      .animate-pulse-subtle {
        animation: pulse-subtle 2.5s infinite ease-in-out;
      }
    </style>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              'prospera-green': '#A5D63F',
              'prospera-pink': '#F47AA8',
              'prospera-blue': '#5BC4E2',
              'prospera-orange': '#F4A63B',
              'prospera-purple': '#762C83',
            },
            fontFamily: {
              sans: ['Nunito', 'sans-serif'],
              display: ['"Baloo 2"', 'sans-serif'],
            }
          }
        }
      }
    </script>

}
</script>
